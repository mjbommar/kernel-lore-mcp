# grokmirror configuration for kernel-lore-mcp
#
# Pulls every public-inbox shard listed in lore.kernel.org's manifest
# via the sanctioned grokmirror protocol. This is the ONLY way we
# talk to lore — zero HTTP load on the web surface, delta-only
# packfiles, policy-clean.
#
# See docs/ops/update-frequency.md for the 5-min cadence reasoning
# and docs/ops/runbook.md for operator quick-start.
#
# Environment expected when invoked via klmcp-grok-pull.sh:
#   KLMCP_DATA_DIR — root for data/state; shards land under $KLMCP_DATA_DIR/shards
#
# Per grokmirror docs (https://korg.docs.kernel.org/grokmirror.html):

[core]
toplevel = %(KLMCP_DATA_DIR)s/shards
manifest = %(KLMCP_DATA_DIR)s/shards/manifest.js.gz
log      = %(KLMCP_DATA_DIR)s/logs/grokmirror.log
loglevel = info

[remote]
# Master manifest for all lore public-inbox shards.
site     = https://lore.kernel.org
manifest = https://lore.kernel.org/manifest.js.gz

[pull]
# Only include public-inbox epochs under /all/* and the per-list roots;
# exclude site-internal mirrors. Keep this narrow; self-hosters can
# widen if they want the full corpus locally.
include  = *
exclude  = /pub/scm/* /mirrors/*

# Shards we care about specifically — blank means "every shard in the
# manifest." The hosted instance runs the empty default; a self-hoster
# targeting (e.g.) just linux-cifs can list it here to keep the
# mirror small.
#
# Example scoping:
#   projectslist = /linux-cifs /all/0 /all/1
projectslist =

# Post-update hook: bump the ingest trigger. We use a file-mtime
# touch so the klmcp-ingest systemd path-unit fires exactly once per
# successful grok-pull, regardless of how many shards changed.
post_update_hook = /usr/local/lib/kernel-lore-mcp/post-pull-hook.sh

# Politeness + robustness knobs.
purgeprotect   = 2
default_owner  = kernel-lore-mcp
pull_threads   = 4
shallow        = no
