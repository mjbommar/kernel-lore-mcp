# grokmirror 2.0+ configuration template for kernel-lore-mcp
#
# This file is a TEMPLATE. The klmcp-grok-pull.sh driver expands
# @KLMCP_DATA_DIR@ to the actual path before invoking grok-pull.
# Do not edit the expanded config at runtime — it gets rewritten
# every tick.
#
# Full-corpus pull. Mirrors every public-inbox shard listed in
# lore.kernel.org's manifest via the sanctioned grokmirror protocol.
# Zero HTTP load on the web surface, delta-only packfiles.
#
# For a narrower first-sync (~100 MB, 3-5 lists) use
# scripts/grokmirror-personal.conf instead.
#
# Verified against grokmirror 2.0.12. Schema:
#   [core]   toplevel, objstore, manifest, log, loglevel
#   [remote] site, manifest
#   [pull]   include, exclude, projectslist, post_update_hook,
#            retries, remotename
#
# See docs/ops/update-frequency.md for the 5-min cadence reasoning
# and docs/ops/runbook.md for operator quick-start.

[core]
# Where grokmirror drops the repos (mirrors the lore manifest layout:
# <list>/git/<N>.git).
toplevel = @KLMCP_DATA_DIR@/shards

# Shared-object deduplication store. Small on first pull, grows as
# shards accrete common objects. Must exist; grokmirror creates it.
objstore = @KLMCP_DATA_DIR@/objstore

# Local manifest cache — grokmirror uses this to decide what's new.
manifest = @KLMCP_DATA_DIR@/shards/manifest.js.gz

log = @KLMCP_DATA_DIR@/logs/grokmirror.log
loglevel = info

[remote]
# Master manifest for all lore public-inbox shards.
site = https://lore.kernel.org
manifest = https://lore.kernel.org/manifest.js.gz

[pull]
# Include every shard in the manifest; exclude nothing. The lore
# manifest only contains public-inbox shards — no site-internal
# mirrors to filter out.
include = *
exclude =

# projectslist (if set) limits pulls to an explicit set. Empty =
# pull everything the manifest advertises. For a narrower first
# sync see scripts/grokmirror-personal.conf.
projectslist =

# Post-update hook. grok-pull calls it once per updated repo with
# the repo path as $1; our hook touches the ingest trigger file so
# klmcp-ingest.path fires exactly once per successful pull batch.
post_update_hook = @KLMCP_POST_PULL_HOOK@

# Pull-side retries on transient network errors.
retries = 3

# Name of the grokmirror-managed remote inside each cloned repo.
remotename = _grokmirror
