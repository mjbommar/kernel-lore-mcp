# grokmirror config for personal use — narrow starter scope.
#
# Clones 5 subsystem lists (~1.5 GB total) instead of the full
# 390-shard corpus (~55 GB). Intended for "I want to try this on my
# laptop tonight" scenarios. Scale up by adding lines to `include`
# when you want more coverage.
#
# Measured as of April 2026:
#   bpf                    ~620 MB
#   linux-nfs              ~400 MB
#   linux-security-module  ~210 MB
#   linux-cifs             ~130 MB
#   linux-hardening        ~120 MB
# First sync: 3-10 minutes depending on upstream bandwidth.
#
# Used the same way as scripts/grokmirror.conf — pass
# KLMCP_GROKMIRROR_CONF_TEMPLATE=scripts/grokmirror-personal.conf to
# klmcp-grok-pull.sh.
#
# Verified against grokmirror 2.0.12.

[core]
toplevel = @KLMCP_DATA_DIR@/shards
objstore = @KLMCP_DATA_DIR@/objstore
manifest = @KLMCP_DATA_DIR@/shards/manifest.js.gz
log = @KLMCP_DATA_DIR@/logs/grokmirror.log
loglevel = info

[remote]
site = https://lore.kernel.org
manifest = https://lore.kernel.org/manifest.js.gz

[pull]
# fnmatch-style include. One pattern per line. Every manifest key
# looks like `/<list>/git/<N>.git`; the glob matches any epoch
# shard under each listed subsystem.
#
# Add more lists by appending lines. To sync all of LKML (19 shards,
# multi-GB), add: /lkml/git/*.git
#
# To sync every public-inbox list (what scripts/grokmirror.conf
# does), just remove all the specific lines and leave `include = *`.
include = /linux-cifs/git/*.git
          /linux-nfs/git/*.git
          /linux-security-module/git/*.git
          /linux-hardening/git/*.git
          /bpf/git/*.git

exclude =

# No projectslist — grokmirror walks the manifest against `include`.
projectslist =

post_update_hook = @KLMCP_POST_PULL_HOOK@
retries = 3
remotename = _grokmirror
